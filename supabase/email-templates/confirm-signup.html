<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邮箱验证</title>
</head>
<body style="margin:0;padding:0;background:#F0F0EC;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:48px 16px;">

        <!-- Card -->
        <table width="400" cellpadding="0" cellspacing="0" border="0"
          style="max-width:400px;width:100%;background:#E8EDE6;border-radius:20px;overflow:hidden;">

          <!-- Card Top: Brand + Tag -->
          <tr>
            <td style="padding:32px 32px 0 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <div style="font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#7A8C78;margin-bottom:6px;">
                      邮箱验证
                    </div>
                    <div style="font-size:13px;font-weight:500;color:#3D4D3A;letter-spacing:0.02em;">
                      ai<span style="color:#6B7D68;">job</span>&nbsp;°
                    </div>
                  </td>
                  <td align="right" valign="top">
                    <!-- Dot indicator -->
                    <div style="width:10px;height:10px;background:#5C7A56;border-radius:50%;margin-top:4px;"></div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- OTP Code: big number like the card -->
          <tr>
            <td style="padding:28px 32px 24px 32px;">
              <div style="font-size:52px;font-weight:800;letter-spacing:0.16em;color:#1A1A1A;line-height:1;">
                {{ .Token }}
              </div>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 32px;">
              <div style="height:1px;background:rgba(60,70,55,0.12);"></div>
            </td>
          </tr>

          <!-- Meta info row -->
          <tr>
            <td style="padding:20px 32px 28px 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7A8C78;margin-bottom:4px;">
                      有效期限
                    </div>
                    <div style="font-size:13px;font-weight:500;color:#3D4D3A;">
                      10 分钟
                    </div>
                  </td>
                  <td>
                    <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7A8C78;margin-bottom:4px;">
                      使用方式
                    </div>
                    <div style="font-size:13px;font-weight:500;color:#3D4D3A;">
                      一次性使用
                    </div>
                  </td>
                  <td align="right" valign="bottom">
                    <div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#7A8C78;">
                      AIJOB
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /Card -->

        <!-- Footer note -->
        <table width="400" cellpadding="0" cellspacing="0" border="0"
          style="max-width:400px;width:100%;margin-top:20px;">
          <tr>
            <td style="text-align:center;padding:0 16px;">
              <p style="font-size:12px;color:#9CA89A;line-height:1.7;margin:0;">
                如果你没有注册 aijob，请忽略此邮件。<br/>
                请勿将验证码分享给任何人。
              </p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
